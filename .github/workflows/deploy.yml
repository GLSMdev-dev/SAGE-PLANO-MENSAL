name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config.js from template
        env:
          API_URL: ${{ secrets.API_URL }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          echo "🔧 Criando config.js a partir do template..."
          
          # Criar diretório se não existir
          mkdir -p assets/js
          
          # Gerar config.js (sem API_KEY - segurança)
          cat > assets/js/config.js << EOF
          window.APP_CONFIG = {
              API_URL: '${API_URL}',
              SPREADSHEET_ID: '${SPREADSHEET_ID}',
              APP_NAME: 'SAGE Planos',
              APP_VERSION: '1.0.0'
          };
          EOF
          
          echo "✅ config.js gerado com sucesso!"
          echo "Conteúdo do config.js:"
          cat assets/js/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
