name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - List secrets (hide values)
        run: |
          echo "🔍 Verificando secrets disponíveis..."
          if [ -n "${{ secrets.API_URL }}" ]; then
            echo "✅ API_URL está definida"
          else
            echo "❌ API_URL NÃO está definida"
          fi
          
          if [ -n "${{ secrets.SPREADSHEET_ID }}" ]; then
            echo "✅ SPREADSHEET_ID está definida"
          else
            echo "❌ SPREADSHEET_ID NÃO está definida"
          fi
          
          if [ -n "${{ secrets.API_KEY }}" ]; then
            echo "✅ API_KEY está definida"
          else
            echo "❌ API_KEY NÃO está definida"
          fi

      - name: Create config.js
        env:
          API_URL: ${{ secrets.API_URL }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          mkdir -p assets/js
          
          echo "📝 Criando config.js..."
          echo "window.APP_CONFIG = {" > assets/js/config.js
          echo "  API_URL: '${API_URL}'," >> assets/js/config.js
          echo "  SPREADSHEET_ID: '${SPREADSHEET_ID}'," >> assets/js/config.js
          echo "  API_KEY: '${API_KEY}'," >> assets/js/config.js
          echo "  APP_NAME: 'SAGE Planos'," >> assets/js/config.js
          echo "  APP_VERSION: '1.0.0'" >> assets/js/config.js
          echo "};" >> assets/js/config.js
          
          echo "✅ config.js criado!"
          echo "Conteúdo do config.js:"
          cat assets/js/config.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
