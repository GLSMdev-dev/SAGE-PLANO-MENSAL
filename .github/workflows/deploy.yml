name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config.js
        run: |
          mkdir -p assets/js
          echo "window.APP_CONFIG = {" > assets/js/config.js
          echo "    API_URL: '${{ secrets.API_URL }}'," >> assets/js/config.js
          echo "    SPREADSHEET_ID: '${{ secrets.SPREADSHEET_ID }}'," >> assets/js/config.js
          echo "    APP_NAME: 'SAGE Planos'," >> assets/js/config.js
          echo "    APP_VERSION: '2.0.0'" >> assets/js/config.js
          echo "};" >> assets/js/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
