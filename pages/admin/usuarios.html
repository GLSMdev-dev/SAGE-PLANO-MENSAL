<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Usuários | SAGE Planos</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="logo">
                <h1>SAGE Planos</h1>
                <p>Gerenciamento de Usuários</p>
            </div>
            <div class="user-info">
                <span class="user-name" id="userName">Carregando...</span>
                <button class="btn-logout" onclick="Auth.logout()">Sair</button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Usuários do Sistema</h2>
            <button class="btn btn-primary" onclick="abrirModalCadastro()">+ Novo Usuário</button>
        </div>
        
        <div class="card">
            <div class="table-container">
                <table id="tabelaUsuarios">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Perfil</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaUsuarios">
                        <tr>
                            <td colspan="6" style="text-align: center;">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Modal de Cadastro/Edição -->
    <div id="modalUsuario" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Novo Usuário</h3>
                <span class="modal-close" onclick="fecharModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="formUsuario">
                    <input type="hidden" id="usuarioId">
                    <div class="form-group">
                        <label for="nome">Nome completo *</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail *</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="perfil">Perfil *</label>
                        <select id="perfil" required>
                            <option value="">Selecione...</option>
                            <option value="admin">Administrador</option>
                            <option value="gestor">Gestor</option>
                            <option value="professor">Professor</option>
                        </select>
                    </div>
                    <div class="form-group" id="disciplinaGroup" style="display: none;">
                        <label for="disciplina_id">Disciplina</label>
                        <select id="disciplina_id">
                            <option value="">Selecione...</option>
                        </select>
                    </div>
                    <div class="form-group" id="turmaGroup" style="display: none;">
                        <label for="turma_id">Turma</label>
                        <select id="turma_id">
                            <option value="">Selecione...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="senha">Senha *</label>
                        <input type="password" id="senha">
                        <small style="color: #666;">Deixe em branco para manter a senha atual (na edição)</small>
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="ativo" checked> Usuário ativo
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="salvarUsuario()">Salvar</button>
            </div>
        </div>
    </div>
    
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/utils.js"></script>
    <script>
        let usuarios = [];
        
        document.addEventListener('DOMContentLoaded', async function() {
            if (!Auth.verificarAcesso()) return;
            
            const usuario = Auth.getUsuarioLogado();
            if (usuario.perfil !== 'admin') {
                Auth.redirecionarPorPerfil();
                return;
            }
            
            document.getElementById('userName').textContent = usuario.nome;
            
            // Carregar listas para os selects
            await carregarDisciplinas();
            await carregarTurmas();
            
            // Carregar usuários
            await carregarUsuarios();
            
            // Evento para mostrar/ocultar campos conforme perfil
            document.getElementById('perfil').addEventListener('change', function() {
                const isProfessor = this.value === 'professor';
                document.getElementById('disciplinaGroup').style.display = isProfessor ? 'block' : 'none';
                document.getElementById('turmaGroup').style.display = isProfessor ? 'block' : 'none';
            });
        });
        
        async function carregarDisciplinas() {
            try {
                const result = await API.listarDisciplinas();
                const select = document.getElementById('disciplina_id');
                select.innerHTML = '<option value="">Selecione...</option>';
                if (result.dados) {
                    result.dados.forEach(disciplina => {
                        select.innerHTML += `<option value="${disciplina.id}">${disciplina.nome}</option>`;
                    });
                }
            } catch (error) {
                console.error('Erro ao carregar disciplinas:', error);
            }
        }
        
        async function carregarTurmas() {
            try {
                const result = await API.listarTurmas();
                const select = document.getElementById('turma_id');
                select.innerHTML = '<option value="">Selecione...</option>';
                if (result.dados) {
                    result.dados.forEach(turma => {
                        select.innerHTML += `<option value="${turma.id}">${turma.nome}</option>`;
                    });
                }
            } catch (error) {
                console.error('Erro ao carregar turmas:', error);
            }
        }
        
        async function carregarUsuarios() {
            try {
                Utils.mostrarLoading(true);
                const result = await API.listarUsuarios();
                usuarios = result.dados || [];
                renderizarTabela();
                Utils.mostrarLoading(false);
            } catch (error) {
                Utils.mostrarMensagem('Erro ao carregar usuários: ' + error.message, 'error');
                Utils.mostrarLoading(false);
            }
        }
        
        function renderizarTabela() {
            const tbody = document.getElementById('listaUsuarios');
            if (!usuarios.length) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Nenhum usuário cadastrado</td></tr>';
                return;
            }
            
            tbody.innerHTML = usuarios.map(usuario => `
                <tr>
                    <td>${usuario.id}</td>
                    <td>${Utils.escapeHtml(usuario.nome)}</td>
                    <td>${Utils.escapeHtml(usuario.email)}</td>
                    <td>${getPerfilNome(usuario.perfil)}</td>
                    <td>${usuario.ativo === 'TRUE' || usuario.ativo === true ? '✅ Ativo' : '❌ Inativo'}</td>
                    <td>
                        <button class="btn btn-primary" style="margin-right: 5px;" onclick="editarUsuario(${usuario.id})">Editar</button>
                        <button class="btn btn-danger" onclick="excluirUsuario(${usuario.id})">Excluir</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function getPerfilNome(perfil) {
            const perfis = {
                'admin': 'Administrador',
                'gestor': 'Gestor',
                'professor': 'Professor'
            };
            return perfis[perfil] || perfil;
        }
        
        function abrirModalCadastro() {
            document.getElementById('modalTitle').textContent = 'Novo Usuário';
            document.getElementById('formUsuario').reset();
            document.getElementById('usuarioId').value = '';
            document.getElementById('senha').required = true;
            document.getElementById('ativo').checked = true;
            document.getElementById('perfil').value = '';
            document.getElementById('disciplinaGroup').style.display = 'none';
            document.getElementById('turmaGroup').style.display = 'none';
            document.getElementById('modalUsuario').classList.add('active');
        }
        
        function editarUsuario(id) {
            const usuario = usuarios.find(u => u.id == id);
            if (!usuario) return;
            
            document.getElementById('modalTitle').textContent = 'Editar Usuário';
            document.getElementById('usuarioId').value = usuario.id;
            document.getElementById('nome').value = usuario.nome;
            document.getElementById('email').value = usuario.email;
            document.getElementById('perfil').value = usuario.perfil;
            document.getElementById('ativo').checked = usuario.ativo === 'TRUE' || usuario.ativo === true;
            document.getElementById('senha').required = false;
            document.getElementById('senha').value = '';
            
            if (usuario.perfil === 'professor') {
                document.getElementById('disciplina_id').value = usuario.disciplina_id || '';
                document.getElementById('turma_id').value = usuario.turma_id || '';
                document.getElementById('disciplinaGroup').style.display = 'block';
                document.getElementById('turmaGroup').style.display = 'block';
            } else {
                document.getElementById('disciplinaGroup').style.display = 'none';
                document.getElementById('turmaGroup').style.display = 'none';
            }
            
            document.getElementById('modalUsuario').classList.add('active');
        }
        
        async function salvarUsuario() {
            const id = document.getElementById('usuarioId').value;
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const perfil = document.getElementById('perfil').value;
            const senha = document.getElementById('senha').value;
            const ativo = document.getElementById('ativo').checked;
            const disciplina_id = document.getElementById('disciplina_id').value;
            const turma_id = document.getElementById('turma_id').value;
            
            if (!nome || !email || !perfil) {
                Utils.mostrarMensagem('Preencha todos os campos obrigatórios', 'error');
                return;
            }
            
            const dados = {
                nome,
                email,
                perfil,
                ativo: ativo ? 'TRUE' : 'FALSE'
            };
            
            if (perfil === 'professor') {
                dados.disciplina_id = disciplina_id;
                dados.turma_id = turma_id;
            }
            
            try {
                Utils.mostrarLoading(true);
                
                if (id) {
                    // Atualizar
                    if (senha) dados.senha = senha;
                    await API.atualizarUsuario(id, dados);
                    Utils.mostrarMensagem('Usuário atualizado com sucesso!', 'success');
                } else {
                    // Criar
                    if (!senha) {
                        Utils.mostrarMensagem('Senha é obrigatória para novo usuário', 'error');
                        Utils.mostrarLoading(false);
                        return;
                    }
                    dados.senha = senha;
                    await API.criarUsuario(dados);
                    Utils.mostrarMensagem('Usuário criado com sucesso!', 'success');
                }
                
                fecharModal();
                await carregarUsuarios();
                Utils.mostrarLoading(false);
            } catch (error) {
                Utils.mostrarMensagem('Erro ao salvar: ' + error.message, 'error');
                Utils.mostrarLoading(false);
            }
        }
        
        async function excluirUsuario(id) {
            Utils.confirmarAcao('Tem certeza que deseja excluir este usuário?', async (confirmado) => {
                if (confirmado) {
                    try {
                        Utils.mostrarLoading(true);
                        await API.deletarUsuario(id);
                        Utils.mostrarMensagem('Usuário excluído com sucesso!', 'success');
                        await carregarUsuarios();
                        Utils.mostrarLoading(false);
                    } catch (error) {
                        Utils.mostrarMensagem('Erro ao excluir: ' + error.message, 'error');
                        Utils.mostrarLoading(false);
                    }
                }
            });
        }
        
        function fecharModal() {
            document.getElementById('modalUsuario').classList.remove('active');
        }
    </script>
</body>
</html>
