<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE - Consulta de Planos</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 10px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 8px; width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto; padding: 25px; position: relative; }
        
        /* Estilos básicos para visualização no modal */
        .view-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 13px; }
        .view-table td { border: 1px solid #ddd; padding: 8px; }
        .view-box { border: 1px solid #ddd; padding: 10px; margin-bottom: 15px; background: #f9f9f9; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo"><h1>SAGE <span>Planos</span></h1></div>
            <nav class="user-info">
                <span id="userName" class="user-name">Carregando...</span>
                <button onclick="Auth.logout()" class="btn-logout">Sair</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="header-actions" style="margin: 20px 0;">
            <button onclick="location.href='dashboard.html'" class="btn-secondary">← Voltar</button>
        </div>
        
        <div id="listaPlanos" class="planos-grid"></div>
    </main>

    <div id="modalPlano" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharModal()" style="position:absolute; right:15px; top:10px; cursor:pointer; font-size:24px;">&times;</span>
            
            <h2 style="text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">Pré-visualização do Plano</h2>
            <div id="renderVisualizacao"></div>
            
            <div class="modal-actions" style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
                <button id="btnImprimirPDF" class="btn-primary">📥 Gerar PDF do Plano</button>
                <button onclick="fecharModal()" class="btn-secondary">Fechar</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/utils.js"></script>

    <script>
        let todosPlanos = [];
        let mapaUsuarios = {};
        let mapaDisciplinas = {};

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.verificarAcesso()) return;
            document.getElementById('userName').textContent = Auth.getUsuarioLogado().nome;
            await carregarDados();
        });

        async function carregarDados() {
            try {
                Utils.mostrarLoading(true);
                const [resPlanos, resUsers, resDiscs] = await Promise.all([
                    API.listarPlanos(),
                    API.listarUsuarios(),
                    API.listarDisciplinas()
                ]);
                (resUsers.dados || []).forEach(u => mapaUsuarios[u.id] = u.nome);
                (resDiscs.dados || []).forEach(d => mapaDisciplinas[d.id] = d.nome);
                todosPlanos = resPlanos.dados || [];
                renderizarPlanos(todosPlanos);
                Utils.mostrarLoading(false);
            } catch (error) {
                console.error("Erro ao carregar dados:", error);
                Utils.mostrarLoading(false);
            }
        }

        function renderizarPlanos(planos) {
            const container = document.getElementById('listaPlanos');
            container.innerHTML = planos.map(p => `
                <div class="plano-card">
                    <h3>${mapaDisciplinas[p.disciplina_id] || 'Disciplina ID: '+p.disciplina_id}</h3>
                    <p><strong>Professor:</strong> ${mapaUsuarios[p.professor_id] || 'Não identificado'}</p>
                    <p><strong>Série/Turma:</strong> ${p.serie || '---'} | <strong>Mês/Ano:</strong> ${p.mes_referencia}/${p.ano_referencia}</p>
                    <button onclick="abrirModalPlano('${p.id}')" class="btn-primary" style="width:100%; margin-top:10px;">Ver e Imprimir</button>
                </div>
            `).join('');
        }

        function abrirModalPlano(id) {
            const plano = todosPlanos.find(p => p.id == id);
            if (!plano) return;

            // Prepara os dados legíveis
            const nomeProf = mapaUsuarios[plano.professor_id] || 'NÃO IDENTIFICADO';
            const nomeDisc = mapaDisciplinas[plano.disciplina_id] || 'NÃO IDENTIFICADA';
            const serieTurma = plano.serie || '---';
            const periodo = `${String(plano.mes_referencia).padStart(2, '0')}/${plano.ano_referencia}`;

            // Exibe um resumo rápido no modal
            const htmlResumo = `
                <table class="view-table">
                    <tr><td><strong>Professor:</strong> ${nomeProf}</td><td><strong>Disciplina:</strong> ${nomeDisc}</td></tr>
                    <tr><td><strong>Série:</strong> ${serieTurma}</td><td><strong>Período:</strong> ${periodo}</td></tr>
                </table>
                <p><strong>Conteúdo Mensal:</strong></p>
                <div class="view-box">${plano.conteudo_mensal || 'Vazio'}</div>
                <p><em>* Clique em "Gerar PDF" para ver o documento completo com cabeçalho, rodapé e aulas detalhadas.</em></p>
            `;
            
            document.getElementById('renderVisualizacao').innerHTML = htmlResumo;
            
            // Configura o botão de impressão passando os dados completos
            document.getElementById('btnImprimirPDF').onclick = () => gerarPDF(plano, nomeProf, nomeDisc, serieTurma, periodo);
            
            document.getElementById('modalPlano').classList.add('active');
        }

        // FUNÇÃO ISOLADA APENAS PARA O PDF
        function gerarPDF(p, nomeProf, nomeDisc, serieTurma, periodo) {
            let aulasHtml = '';
            for (let i = 1; i <= 40; i++) {
                const sub = p[`aula_${i}_subconteudo`];
                if (sub) {
                    aulasHtml += `
                        <div class="aula-box">
                            <span class="aula-title">AULA ${i}</span>
                            <strong>Subconteúdo:</strong> ${sub}<br>
                            <strong>Metodologia:</strong> ${p[`aula_${i}_metodologia`] || '-'}<br>
                            <strong>Recursos:</strong> ${p[`aula_${i}_recursos`] || '-'}<br>
                            <strong>Avaliação:</strong> ${p[`aula_${i}_avaliacao`] || '-'}
                        </div>`;
                }
            }

            const win = window.open('', '_blank');
            win.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Plano de Aula - ${nomeProf}</title>
                    <style>
                        @page { margin: 1cm; }
                        body { font-family: Arial, sans-serif; font-size: 11px; color: #000; line-height: 1.3; }
                        
                        /* Cabeçalho exatamente como você pediu */
                        .header { text-align: center; margin-bottom: 15px; border-bottom: 1px solid #000; padding-bottom: 15px; }
                        .logo { max-width: 70px; display: block; margin: 0 auto 10px; }
                        .header-text { font-weight: bold; font-size: 12px; }
                        
                        /* Tabelas e Caixas */
                        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
                        .info-table td { border: 1px solid #000; padding: 6px; }
                        .label { font-weight: bold; background-color: #eee; width: 130px; }
                        
                        .section-title { background-color: #eee; font-weight: bold; padding: 5px; border: 1px solid #000; text-align: center; text-transform: uppercase; margin-top: 10px; }
                        .content-box { border: 1px solid #000; border-top: none; padding: 10px; min-height: 40px; margin-bottom: 15px; }
                        
                        /* Aulas */
                        .aula-box { border: 1px solid #000; padding: 10px; margin-bottom: 8px; page-break-inside: avoid; }
                        .aula-title { font-weight: bold; text-decoration: underline; margin-bottom: 5px; display: block; }
                        
                        /* Rodapé exatamente como você pediu */
                        .footer { margin-top: 40px; page-break-inside: avoid; }
                        .signatures { display: flex; justify-content: space-around; margin-top: 60px; margin-bottom: 40px; }
                        .sig-line { border-top: 1px solid #000; width: 250px; text-align: center; padding-top: 5px; font-weight: bold; font-size: 11px; }
                        .contact-info { text-align: center; font-size: 10px; border-top: 1px solid #000; padding-top: 10px; }
                        .sage-tag { text-align: center; font-size: 9px; color: #555; margin-top: 10px; }
                    </style>
                </head>
                <body onload="setTimeout(() => { window.print(); window.close(); }, 500);">
                    
                    <div class="header">
                        <img src="../../assets/logo-escola.png" class="logo" onerror="this.style.display='none'">
                        <div class="header-text">
                            Coordenadoria Regional de Desenvolvimento da Educação – CREDE 16<br>
                            Escola de Ensino Médio em Tempo Integral Filgueiras Lima – INEP: 23142804
                        </div>
                    </div>

                    <table class="info-table">
                        <tr>
                            <td class="label">PROFESSOR(A):</td>
                            <td>${nomeProf.toUpperCase()}</td>
                            <td class="label">DISCIPLINA:</td>
                            <td>${nomeDisc.toUpperCase()}</td>
                        </tr>
                        <tr>
                            <td class="label">SÉRIE / TURMA:</td>
                            <td>${serieTurma.toUpperCase()}</td>
                            <td class="label">MÊS/ANO REF:</td>
                            <td>${periodo}</td>
                        </tr>
                    </table>

                    <div class="section-title">Conteúdo Programático Mensal</div>
                    <div class="content-box">${p.conteudo_mensal || ''}</div>

                    <div class="section-title">Referências / Recursos Didáticos</div>
                    <div class="content-box">${p.referencias || ''}</div>

                    <div class="section-title" style="margin-bottom: 10px;">Detalhamento das Aulas</div>
                    ${aulasHtml || '<div class="content-box">Nenhuma aula detalhada.</div>'}

                    <div class="footer">
                        <div class="signatures">
                            <div class="sig-line">Assinatura do Professor(a)</div>
                            <div class="sig-line">Coordenação Pedagógica</div>
                        </div>
                        <div class="contact-info">
                            Rua Vereador Nelson de Sousa Alencar, sn – Veneza | Iguatu – Ceará | CEP: 63.504-356 - Fone: (88) 3581.9463<br>
                            E-mail: filgueiraslimacrede16@escola.ce.gov.br | Instagram: @filgueiraslimaiguatu
                        </div>
                        <div class="sage-tag">
                            SAGE - Sistema Alternativo de Gestão Escolar | Gerado em ${new Date().toLocaleDateString()}
                        </div>
                    </div>
                </body>
                </html>
            `);
            win.document.close();
        }

        function fecharModal() { document.getElementById('modalPlano').classList.remove('active'); }
    </script>
</body>
</html>
