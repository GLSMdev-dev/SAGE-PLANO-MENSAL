<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE - Consulta de Planos</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        /* Filtros de Gestão */
        .filter-section { background: #f4f4f4; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; border: 1px solid #ddd; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-weight: bold; font-size: 14px; }
        .filter-group select, .filter-group input { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }

        /* Modal e Interface */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 8px; width: 95%; max-width: 900px; max-height: 90vh; overflow-y: auto; padding: 25px; position: relative; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <header class="header no-print">
        <div class="container">
            <div class="logo"><h1>SAGE <span>Planos</span></h1></div>
            <nav class="user-info">
                <span id="userName" class="user-name">Carregando...</span>
                <button onclick="Auth.logout()" class="btn-logout">Sair</button>
            </nav>
        </div>
    </header>

    <main class="container no-print">
        <div class="header-actions" style="margin: 20px 0;">
            <button onclick="location.href='dashboard.html'" class="btn-secondary">← Voltar ao Menu</button>
        </div>

        <section class="filter-section">
            <div class="filter-group">
                <label>Professor:</label>
                <select id="filterProfessor" onchange="aplicarFiltros()">
                    <option value="">Todos os Professores</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Disciplina:</label>
                <select id="filterDisciplina" onchange="aplicarFiltros()">
                    <option value="">Todas as Disciplinas</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Série:</label>
                <select id="filterSerie" onchange="aplicarFiltros()">
                    <option value="">Todas as Séries</option>
                    <option value="1ª Série">1ª Série</option>
                    <option value="2ª Série">2ª Série</option>
                    <option value="3ª Série">3ª Série</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Mês de Referência:</label>
                <input type="month" id="filterMes" onchange="aplicarFiltros()">
            </div>
        </section>
        
        <div id="listaPlanos" class="planos-grid"></div>
    </main>

    <div id="modalPlano" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharModal()" style="position:absolute; right:15px; top:10px; cursor:pointer; font-size:24px;">&times;</span>
            <div id="renderVisualizacao"></div>
            <div class="modal-actions" style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
                <button id="btnImprimirPDF" class="btn-primary">📥 Gerar PDF Oficial</button>
                <button onclick="fecharModal()" class="btn-secondary">Fechar</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/utils.js"></script>

    <script>
        let todosPlanos = [];
        let mapaUsuarios = {};
        let mapaDisciplinas = {};

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.verificarAcesso()) return;
            document.getElementById('userName').textContent = Auth.getUsuarioLogado().nome;
            await carregarDados();
        });

        async function carregarDados() {
            try {
                Utils.mostrarLoading(true);
                const [resPlanos, resUsers, resDiscs] = await Promise.all([
                    API.listarPlanos(),
                    API.listarUsuarios(),
                    API.listarDisciplinas()
                ]);
                
                const profSelect = document.getElementById('filterProfessor');
                resUsers.dados.forEach(u => {
                    mapaUsuarios[u.id] = u.nome;
                    profSelect.innerHTML += `<option value="${u.id}">${u.nome}</option>`;
                });

                const discSelect = document.getElementById('filterDisciplina');
                resDiscs.dados.forEach(d => {
                    mapaDisciplinas[d.id] = d.nome;
                    discSelect.innerHTML += `<option value="${d.id}">${d.nome}</option>`;
                });

                todosPlanos = resPlanos.dados || [];
                renderizarPlanos(todosPlanos);
                Utils.mostrarLoading(false);
            } catch (error) {
                console.error(error);
                Utils.mostrarLoading(false);
            }
        }

        function aplicarFiltros() {
            const prof = document.getElementById('filterProfessor').value;
            const disc = document.getElementById('filterDisciplina').value;
            const serie = document.getElementById('filterSerie').value;
            const mesInput = document.getElementById('filterMes').value; // Formato YYYY-MM

            let filtrados = todosPlanos.filter(p => {
                let matchProf = prof ? p.professor_id == prof : true;
                let matchDisc = disc ? p.disciplina_id == disc : true;
                let matchSerie = serie ? p.serie == serie : true;
                
                let matchMes = true;
                if (mesInput) {
                    const [ano, mes] = mesInput.split('-');
                    matchMes = (p.ano_referencia == ano && p.mes_referencia == parseInt(mes));
                }

                return matchProf && matchDisc && matchSerie && matchMes;
            });

            renderizarPlanos(filtrados);
        }

        function renderizarPlanos(planos) {
            const container = document.getElementById('listaPlanos');
            if (planos.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 20px;">Nenhum plano encontrado com estes filtros.</p>';
                return;
            }
            container.innerHTML = planos.map(p => `
                <div class="plano-card">
                    <h3>${mapaDisciplinas[p.disciplina_id]}</h3>
                    <p><strong>Prof:</strong> ${mapaUsuarios[p.professor_id]}</p>
                    <p><strong>Ref:</strong> ${p.mes_referencia}/${p.ano_referencia} | ${p.serie}</p>
                    <button onclick="abrirVisualizacao('${p.id}')" class="btn-primary" style="width:100%;">Visualizar</button>
                </div>
            `).join('');
        }

        function abrirVisualizacao(id) {
            const plano = todosPlanos.find(p => p.id == id);
            const nomeProf = mapaUsuarios[plano.professor_id];
            const nomeDisc = mapaDisciplinas[plano.disciplina_id];
            
            document.getElementById('renderVisualizacao').innerHTML = `
                <p><strong>Plano de:</strong> ${nomeProf} | <strong>Disciplina:</strong> ${nomeDisc}</p>
                <p><strong>Referência:</strong> ${plano.mes_referencia}/${plano.ano_referencia} - ${plano.serie}</p>
                <hr>
                <p>Clique abaixo para gerar o PDF formatado conforme o modelo oficial da escola.</p>
            `;
            
            document.getElementById('btnImprimirPDF').onclick = () => gerarPDFOficial(plano, nomeProf, nomeDisc);
            document.getElementById('modalPlano').classList.add('active');
        }

        function gerarPDFOficial(p, nomeProf, nomeDisc) {
            let aulasHtml = '';
            let currentWeek = 0;
            const aulasPorSemana = parseInt(p.aulas_semana) || 4;

            for (let i = 1; i <= 40; i++) {
                const sub = p[`aula_${i}_subconteudo`];
                if (sub) {
                    let weekNumber = Math.ceil(i / aulasPorSemana);
                    if (weekNumber > currentWeek) {
                        aulasHtml += `<div style="background:#d1e7dd; padding:5px; border:1px solid #000; font-weight:bold; text-align:center; margin-top:10px;">SEMANA ${String(weekNumber).padStart(2, '0')}</div>`;
                        currentWeek = weekNumber;
                    }

                    // A numeração 'i' garante a sequência global (Aula 01, 02, 03...) eliminando o conflito
                    aulasHtml += `
                        <div style="border:1px solid #000; padding:8px; margin-bottom:5px; page-break-inside: avoid;">
                            <span style="font-weight:bold; text-decoration:underline;">AULA ${String(i).padStart(2, '0')}</span><br>
                            <strong>Subconteúdo:</strong> ${sub}<br>
                            <strong>Metodologia:</strong> ${p[`aula_${i}_metodologia`] || '-'}<br>
                            <strong>Recursos:</strong> ${p[`aula_${i}_recursos`] || '-'}<br>
                            <strong>Avaliação:</strong> ${p[`aula_${i}_avaliacao`] || '-'}
                        </div>`;
                }
            }

            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <style>
                        @page { margin: 1cm; }
                        body { font-family: Arial, sans-serif; font-size: 11px; margin: 0; }
                        table { width: 100%; border-collapse: collapse; }
                        td { border: 1px solid #000; padding: 5px; }
                        .header { text-align: center; border-bottom: 1px solid #000; padding-bottom: 10px; margin-bottom: 10px; }
                        .footer { font-size: 9px; text-align: center; border-top: 1px solid #000; padding-top: 10px; margin-top: 20px; }
                    </style>
                </head>
                <body onload="window.print(); window.close();">
                    <table>
                        <thead>
                            <tr><td colspan="4" class="header">
                                <strong>Coordenadoria Regional de Desenvolvimento da Educação – CREDE 16</strong><br>
                                Escola de Ensino Médio em Tempo Integral Filgueiras Lima – INEP: 23142804
                            </td></tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td style="font-weight:bold; background:#eee;">PROFESSOR(A):</td><td>${nomeProf.toUpperCase()}</td>
                                <td style="font-weight:bold; background:#eee;">DISCIPLINA:</td><td>${nomeDisc.toUpperCase()}</td>
                            </tr>
                            <tr>
                                <td style="font-weight:bold; background:#eee;">SÉRIE/TURMA:</td><td>${p.serie.toUpperCase()}</td>
                                <td style="font-weight:bold; background:#eee;">MÊS/ANO REF:</td><td>${String(p.mes_referencia).padStart(2, '0')}/${p.ano_referencia}</td>
                            </tr>
                            <tr><td colspan="4" style="background:#e0e0e0; font-weight:bold; text-align:center;">CONTEÚDO PROGRAMÁTICO MENSAL</td></tr>
                            <tr><td colspan="4">${p.conteudo_mensal || ''}</td></tr>
                            <tr><td colspan="4" style="background:#e0e0e0; font-weight:bold; text-align:center;">DETALHAMENTO DAS AULAS</td></tr>
                            <tr><td colspan="4">${aulasHtml}</td></tr>
                        </tbody>
                        <tfoot>
                            <tr><td colspan="4" class="footer">
                                <div style="display:flex; justify-content:space-around; margin-bottom:20px; padding-top:40px;">
                                    <div style="border-top:1px solid #000; width:200px;">Assinatura do Professor(a)</div>
                                    <div style="border-top:1px solid #000; width:200px;">Coordenação Pedagógica</div>
                                </div>
                                Rua Vereador Nelson de Sousa Alencar, sn – Veneza | Iguatu – Ceará | CEP: 63.504-356<br>
                                E-mail: filgueiraslimacrede16@escola.ce.gov.br | SAGE - Sistema Alternativo de Gestão Escolar
                            </td></tr>
                        </tfoot>
                    </table>
                </body>
                </html>
            `);
            win.document.close();
        }

        function fecharModal() { document.getElementById('modalPlano').classList.remove('active'); }
    </script>
</body>
</html>
