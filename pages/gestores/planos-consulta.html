<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE - Consulta de Planos</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        /* Estilos de Interface */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 10px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 5px; width: 100%; max-width: 800px; max-height: 98vh; overflow-y: auto; padding: 15px; position: relative; }
        
        /* Layout Compacto (Visualização e Impressão) */
        .header-sage { display: flex; align-items: center; border-bottom: 1px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
        .logo-sage { max-width: 50px; height: auto; margin-right: 15px; }
        .header-text h2 { margin: 0; font-size: 16px; text-transform: uppercase; }
        .header-text p { margin: 0; font-size: 12px; color: #444; }
        
        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; font-size: 11px; }
        .info-table td { border: 1px solid #000; padding: 4px 8px; }
        
        .section-title { background: #eee; font-weight: bold; padding: 3px 8px; border: 1px solid #000; font-size: 11px; text-transform: uppercase; margin-top: 5px; }
        .content-box { border: 1px solid #000; border-top: none; padding: 8px; font-size: 11px; margin-bottom: 10px; min-height: 30px; }
        
        .aula-item { border: 1px solid #ccc; padding: 8px; margin-bottom: 5px; page-break-inside: avoid; font-size: 11px; }
        .aula-n { font-weight: bold; border-bottom: 1px solid #eee; margin-bottom: 4px; display: block; color: #222; }

        .footer-sage { margin-top: 30px; font-size: 10px; }
        .sigs { display: flex; justify-content: space-around; margin-top: 40px; }
        .sig-line { border-top: 1px solid #000; width: 200px; text-align: center; padding-top: 3px; }

        @media print { 
            .no-print { display: none !important; }
            body { padding: 0; margin: 0; }
            .modal { position: static; display: block; background: none; padding: 0; }
            .modal-content { max-width: 100%; padding: 0; border: none; }
        }
    </style>
</head>
<body>
    <header class="header no-print">
        <div class="container">
            <div class="logo"><h1>SAGE Planos</h1></div>
            <nav class="user-info">
                <span id="userName" class="user-name">Carregando...</span>
                <button onclick="Auth.logout()" class="btn-logout">Sair</button>
            </nav>
        </div>
    </header>

    <main class="container no-print">
        <div style="margin: 15px 0;"><button onclick="location.href='dashboard.html'" class="btn-secondary">← Voltar</button></div>
        <div id="listaPlanos" class="planos-grid"></div>
    </main>

    <div id="modalPlano" class="modal">
        <div class="modal-content">
            <span class="close-modal no-print" onclick="fecharModal()" style="position:absolute; right:10px; top:5px; cursor:pointer; font-size:20px;">&times;</span>
            <div id="renderVisualizacao"></div>
            <div class="modal-actions no-print" style="margin-top: 15px; display: flex; gap: 10px; justify-content: flex-end; padding-bottom: 10px;">
                <button id="btnImprimirPDF" class="btn-primary" style="padding: 6px 12px; font-size: 12px;">📥 Imprimir Plano</button>
                <button onclick="fecharModal()" class="btn-secondary" style="padding: 6px 12px; font-size: 12px;">Fechar</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/utils.js"></script>

    <script>
        let todosPlanos = [];
        let mapaUsuarios = {};
        let mapaDisciplinas = {};

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.verificarAcesso()) return;
            document.getElementById('userName').textContent = Auth.getUsuarioLogado().nome;
            await carregarDados();
        });

        async function carregarDados() {
            try {
                Utils.mostrarLoading(true);
                const [resPlanos, resUsers, resDiscs] = await Promise.all([
                    API.listarPlanos(),
                    API.listarUsuarios(),
                    API.listarDisciplinas()
                ]);
                (resUsers.dados || []).forEach(u => mapaUsuarios[u.id] = u.nome);
                (resDiscs.dados || []).forEach(d => mapaDisciplinas[d.id] = d.nome);
                todosPlanos = resPlanos.dados || [];
                renderizarPlanos(todosPlanos);
                Utils.mostrarLoading(false);
            } catch (error) {
                console.error(error);
                Utils.mostrarLoading(false);
            }
        }

        function renderizarPlanos(planos) {
            const container = document.getElementById('listaPlanos');
            container.innerHTML = planos.map(p => `
                <div class="plano-card">
                    <h4 style="margin:0">${mapaDisciplinas[p.disciplina_id] || 'Disc. '+p.disciplina_id}</h4>
                    <p style="font-size:12px; margin:5px 0;">${p.serie} - ${p.mes_referencia}/${p.ano_referencia}</p>
                    <button onclick="visualizarPlano('${p.id}')" class="btn-primary" style="padding:5px 10px; font-size:11px;">Visualizar</button>
                </div>
            `).join('');
        }

        function visualizarPlano(id) {
            const plano = todosPlanos.find(p => p.id == id);
            if (!plano) return;

            const nomeProf = mapaUsuarios[plano.professor_id] || 'Não Identificado';
            const nomeDisc = mapaDisciplinas[plano.disciplina_id] || 'Não Identificada';

            const htmlContent = `
                <div class="header-sage">
                    <img src="../../assets/logo-escola.png" class="logo-sage" onerror="this.style.display='none'">
                    <div class="header-text">
                        <h2>EEMTI FILGUEIRAS LIMA</h2>
                        <p>SAGE - Sistema Alternativo de Gestão Escolar</p>
                    </div>
                </div>

                <table class="info-table">
                    <tr>
                        <td width="60%"><strong>PROFESSOR:</strong> ${nomeProf}</td>
                        <td width="40%"><strong>DISCIPLINA:</strong> ${nomeDisc}</td>
                    </tr>
                    <tr>
                        <td><strong>SÉRIE/TURMA:</strong> ${plano.serie || '---'}</td>
                        <td><strong>MÊS/ANO DE REFERÊNCIA:</strong> ${plano.mes_referencia}/${plano.ano_referencia}</td>
                    </tr>
                </table>

                <div class="section-title">Conteúdo Programático Mensal</div>
                <div class="content-box">${plano.conteudo_mensal || ''}</div>

                <div class="section-title">Referências</div>
                <div class="content-box">${plano.referencias || ''}</div>

                <div style="margin-top: 10px;">
                    ${gerarHtmlAulas(plano)}
                </div>

                <div class="footer-sage">
                    <div class="sigs">
                        <div class="sig-line">Assinatura do Professor</div>
                        <div class="sig-line">Coordenação Pedagógica</div>
                    </div>
                    <p style="text-align:center; margin-top:20px; color:#666;">
                        Documento gerado pelo sistema SAGE em ${new Date().toLocaleDateString()} às ${new Date().toLocaleTimeString()}
                    </p>
                </div>
            `;

            document.getElementById('renderVisualizacao').innerHTML = htmlContent;
            document.getElementById('btnImprimirPDF').onclick = () => window.print();
            document.getElementById('modalPlano').classList.add('active');
        }

        function gerarHtmlAulas(p) {
            let html = '';
            for (let i = 1; i <= 40; i++) {
                const sub = p[`aula_${i}_subconteudo`];
                if (sub) {
                    html += `
                        <div class="aula-item">
                            <span class="aula-n">AULA ${i}</span>
                            <strong>Subconteúdo:</strong> ${sub}<br>
                            <strong>Metodologia:</strong> ${p[`aula_${i}_metodologia`] || '-'}<br>
                            <strong>Recursos:</strong> ${p[`aula_${i}_recursos`] || '-'}<br>
                            <strong>Avaliação:</strong> ${p[`aula_${i}_avaliacao`] || '-'}
                        </div>`;
                }
            }
            return html;
        }

        function fecharModal() { document.getElementById('modalPlano').classList.remove('active'); }
    </script>
</body>
</html>
