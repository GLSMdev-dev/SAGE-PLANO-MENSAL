<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE - Consulta de Planos</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        /* Ajustes do Modal de Visualização */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 8px; width: 100%; max-width: 850px; max-height: 90vh; overflow-y: auto; padding: 25px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        /* Ajuste da imagem no Modal (Para não ficar gigantesca) */
        .logo-visualizacao { max-width: 120px; height: auto; display: block; margin: 0 auto 15px; }
        
        /* Estilos da Tabela de Informações no Modal */
        .info-table-view { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
        .info-table-view td { border: 1px solid #ddd; padding: 10px; background: #f9f9f9; }
        
        /* Cards de Aula no Modal */
        .aula-item-view { border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-left: 4px solid #4CAF50; border-radius: 4px; }
        .aula-n-view { font-weight: bold; color: #2e7d32; margin-bottom: 5px; display: block; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <header class="header no-print">
        <div class="container">
            <div class="logo"><h1>SAGE Planos</h1><p>Consulta Escolar</p></div>
            <nav class="user-info">
                <span id="userName" class="user-name">Carregando...</span>
                <button onclick="Auth.logout()" class="btn-logout">Sair</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="header-actions no-print" style="margin: 20px 0;">
            <button onclick="location.href='dashboard.html'" class="btn-secondary">← Voltar</button>
        </div>

        <div id="listaPlanos" class="planos-grid"></div>
    </main>

    <div id="modalPlano" class="modal">
        <div class="modal-content">
            <span class="close-modal no-print" onclick="fecharModal()" style="position:absolute; right:20px; cursor:pointer; font-size:24px;">&times;</span>
            
            <div id="headerModal" style="text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 15px;">
                <img src="../../assets/logo-escola.png" class="logo-visualizacao" onerror="this.style.display='none'">
                <h2 style="margin:0; font-size: 1.4em;">EEMTI FILGUEIRAS LIMA</h2>
                <p style="margin:5px 0; color: #666;">Plano de Aula Mensal</p>
            </div>

            <div id="renderVisualizacao">
                </div>

            <div class="modal-actions no-print" style="margin-top: 25px; display: flex; gap: 10px; justify-content: flex-end;">
                <button id="btnImprimirPDF" class="btn-primary" style="padding: 10px 20px;">📥 Imprimir / Salvar PDF</button>
                <button onclick="fecharModal()" class="btn-secondary">Fechar</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/utils.js"></script>

    <script>
        let todosPlanos = [];

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.verificarAcesso()) return;
            document.getElementById('userName').textContent = Auth.getUsuarioLogado().nome;
            await carregarDados();
        });

        async function carregarDados() {
            try {
                Utils.mostrarLoading(true);
                const res = await API.listarPlanos();
                todosPlanos = res.dados || [];
                renderizarPlanos(todosPlanos);
                Utils.mostrarLoading(false);
            } catch (error) {
                Utils.mostrarMensagem('Erro: ' + error.message, 'error');
                Utils.mostrarLoading(false);
            }
        }

        function renderizarPlanos(planos) {
            const container = document.getElementById('listaPlanos');
            container.innerHTML = planos.map(p => `
                <div class="plano-card">
                    <h3>${p.disciplina_nome} - ${p.turma_nome}</h3>
                    <p>Prof: ${p.professor_nome} | Mês: ${p.mes}/${p.ano}</p>
                    <button onclick="visualizarPlano('${p.id}')" class="btn-primary">Ver Detalhes</button>
                </div>
            `).join('');
        }

        function visualizarPlano(id) {
            const plano = todosPlanos.find(p => p.id == id);
            if (!plano) return;

            // Preenche os dados no modal (Sem "undefined") 
            const htmlInfo = `
                <table class="info-table-view">
                    <tr>
                        <td width="50%"><strong>PROFESSOR:</strong> ${plano.professor_nome || '---'}</td>
                        <td width="50%"><strong>DISCIPLINA:</strong> ${plano.disciplina_nome || '---'}</td>
                    </tr>
                    <tr>
                        <td><strong>SÉRIE/TURMA:</strong> ${plano.turma_nome || '---'}</td>
                        <td><strong>MÊS/ANO:</strong> ${plano.mes || '---'}/${plano.ano || '---'}</td>
                    </tr>
                </table>
                <div style="margin-bottom: 20px;">
                    <strong>CONTEÚDO MENSAL:</strong>
                    <div style="padding: 10px; border: 1px solid #eee; margin-top:5px; background: #fff;">${plano.conteudo_mensal || 'Não informado'}</div>
                </div>
                <div id="detalhamentoAulasView">
                    ${gerarHtmlAulas(plano)}
                </div>
            `;

            document.getElementById('renderVisualizacao').innerHTML = htmlInfo;
            
            // Configura o botão de impressão para o plano selecionado [cite: 31, 32]
            document.getElementById('btnImprimirPDF').onclick = () => dispararImpressao(plano);
            
            document.getElementById('modalPlano').classList.add('active');
        }

        function gerarHtmlAulas(p) {
            let html = '';
            for (let i = 1; i <= 20; i++) {
                const sub = p[`aula_${i}_subconteudo`];
                if (sub) {
                    html += `
                        <div class="aula-item-view">
                            <span class="aula-n-view">AULA ${i}</span>
                            <p><strong>Subconteúdo:</strong> ${sub}</p>
                            <p><strong>Metodologia:</strong> ${p[`aula_${i}_metodologia`] || '-'}</p>
                            <p><strong>Recursos:</strong> ${p[`aula_${i}_recursos`] || '-'}</p>
                            <p><strong>Avaliação:</strong> ${p[`aula_${i}_avaliacao`] || '-'}</p>
                        </div>`;
                }
            }
            return html || '<p>Nenhuma aula detalhada.</p>';
        }

        function dispararImpressao(p) {
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>Plano de Aula - ${p.professor_nome}</title>
                    <style>
                        body { font-family: Arial; padding: 40px; }
                        .header-pdf { text-align: center; border-bottom: 2px solid #000; margin-bottom: 20px; }
                        .logo-pdf { max-width: 100px; margin-bottom: 10px; }
                        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                        .info-table td { border: 1px solid #000; padding: 8px; font-size: 13px; }
                        .box { border: 1px solid #000; padding: 10px; margin-bottom: 20px; }
                        .aula-card { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; page-break-inside: avoid; }
                        .assinaturas { margin-top: 60px; display: flex; justify-content: space-around; }
                        .assinaturas div { border-top: 1px solid #000; width: 200px; text-align: center; padding-top: 5px; font-size: 12px; }
                    </style>
                </head>
                <body onload="window.print();">
                    <div class="header-pdf">
                        <img src="../../assets/logo-escola.png" class="logo-pdf" onerror="this.style.display='none'">
                        <h2>EEMTI FILGUEIRAS LIMA</h2>
                        <p>SAGE - Sistema de Apoio à Gestão Escolar</p>
                    </div>
                    <table class="info-table">
                        <tr><td><strong>PROFESSOR:</strong> ${p.professor_nome}</td><td><strong>DISCIPLINA:</strong> ${p.disciplina_nome}</td></tr>
                        <tr><td><strong>TURMA:</strong> ${p.turma_nome}</td><td><strong>MÊS/ANO:</strong> ${p.mes}/${p.ano}</td></tr>
                    </table>
                    <strong>CONTEÚDO PROGRAMÁTICO MENSAL:</strong>
                    <div class="box">${p.conteudo_mensal || ''}</div>
                    ${gerarHtmlAulas(p)}
                    <div class="assinaturas">
                        <div>Assinatura do Professor</div>
                        <div>Coordenação Pedagógica</div>
                    </div>
                </body>
                </html>
            `);
            win.document.close();
        }

        function fecharModal() { document.getElementById('modalPlano').classList.remove('active'); }
    </script>
</body>
</html>
