<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE - Consulta de Planos</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        /* Estilos de Interface e Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 5px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 4px; width: 100%; max-width: 850px; max-height: 98vh; overflow-y: auto; padding: 15px; position: relative; }
        
        /* Cabeçalho Oficial Compacto */
        .official-header { display: flex; align-items: center; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
        .logo-ceara { max-width: 60px; height: auto; margin-right: 15px; }
        .header-text { flex-grow: 1; text-align: center; }
        .header-text h1 { margin: 0; font-size: 14px; text-transform: uppercase; }
        .header-text p { margin: 1px 0; font-size: 10px; line-height: 1.2; }
        
        /* Tabelas de Dados do Plano */
        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; font-size: 11px; }
        .info-table td { border: 1px solid #000; padding: 4px 8px; }
        
        .section-title { background: #e0e0e0; font-weight: bold; padding: 3px 8px; border: 1px solid #000; font-size: 11px; text-transform: uppercase; margin-top: 5px; }
        .content-box { border: 1px solid #000; border-top: none; padding: 8px; font-size: 11px; margin-bottom: 10px; background: #fff; min-height: 25px; }
        
        /* Detalhamento de Aulas */
        .aula-item { border: 1px solid #999; padding: 8px; margin-bottom: 5px; page-break-inside: avoid; font-size: 11px; }
        .aula-n { font-weight: bold; border-bottom: 1px solid #eee; margin-bottom: 3px; display: block; text-transform: uppercase; }

        /* Rodapé e Assinaturas */
        .footer-print { margin-top: 25px; font-size: 9px; border-top: 1px solid #eee; padding-top: 10px; }
        .sigs { display: flex; justify-content: space-around; margin-top: 35px; }
        .sig-line { border-top: 1px solid #000; width: 200px; text-align: center; padding-top: 3px; font-weight: bold; }

        @media print { 
            .no-print { display: none !important; }
            .modal { position: static; display: block; background: none; padding: 0; }
            .modal-content { max-width: 100%; padding: 0; border: none; }
            body { background: white; padding: 0; margin: 0; }
        }
    </style>
</head>
<body>
    <header class="header no-print">
        <div class="container">
            <div class="logo"><h1>SAGE <span>Planos</span></h1></div>
            <nav class="user-info">
                <span id="userName" class="user-name">Carregando...</span>
                <button onclick="Auth.logout()" class="btn-logout">Sair</button>
            </nav>
        </div>
    </header>

    <main class="container no-print">
        <div class="header-actions" style="margin: 15px 0;">
            <button onclick="location.href='dashboard.html'" class="btn-secondary">← Voltar</button>
        </div>
        <div id="listaPlanos" class="planos-grid"></div>
    </main>

    <div id="modalPlano" class="modal">
        <div class="modal-content">
            <span class="close-modal no-print" onclick="fecharModal()">&times;</span>
            <div id="renderVisualizacao"></div>
            <div class="modal-actions no-print" style="margin-top: 15px; display: flex; gap: 10px; justify-content: flex-end;">
                <button id="btnImprimirPDF" class="btn-primary">📥 Imprimir Plano</button>
                <button onclick="fecharModal()" class="btn-secondary">Fechar</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/utils.js"></script>

    <script>
        let todosPlanos = [];
        let mapaUsuarios = {};
        let mapaDisciplinas = {};

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.verificarAcesso()) return;
            document.getElementById('userName').textContent = Auth.getUsuarioLogado().nome;
            await carregarDados();
        });

        async function carregarDados() {
            try {
                Utils.mostrarLoading(true);
                const [resPlanos, resUsers, resDiscs] = await Promise.all([
                    API.listarPlanos(),
                    API.listarUsuarios(),
                    API.listarDisciplinas()
                ]);
                (resUsers.dados || []).forEach(u => mapaUsuarios[u.id] = u.nome);
                (resDiscs.dados || []).forEach(d => mapaDisciplinas[d.id] = d.nome);
                todosPlanos = resPlanos.dados || [];
                renderizarPlanos(todosPlanos);
                Utils.mostrarLoading(false);
            } catch (error) {
                console.error(error);
                Utils.mostrarLoading(false);
            }
        }

        function renderizarPlanos(planos) {
            const container = document.getElementById('listaPlanos');
            container.innerHTML = planos.map(p => `
                <div class="plano-card">
                    <h3>${mapaDisciplinas[p.disciplina_id] || 'Disciplina '+p.disciplina_id}</h3>
                    <p><strong>Professor:</strong> ${mapaUsuarios[p.professor_id] || 'Carregando...'}</p>
                    <p><strong>Série:</strong> ${p.serie} | <strong>Mês:</strong> ${p.mes_referencia}/${p.ano_referencia}</p>
                    <button onclick="visualizarPlano('${p.id}')" class="btn-primary" style="width:100%; margin-top:10px;">Ver Detalhes</button>
                </div>
            `).join('');
        }

        function visualizarPlano(id) {
            const plano = todosPlanos.find(p => p.id == id);
            if (!plano) return;

            const htmlContent = `
                <div class="official-header">
                    <img src="../../assets/logo-escola.png" class="logo-ceara" onerror="this.style.display='none'">
                    <div class="header-text">
                        <h1>Governo do Estado do Ceará</h1>
                        <p>Secretaria da Educação - CREDE 16</p>
                        <p><strong>EEMTI FILGUEIRAS LIMA</strong> - INEP: 23142804</p>
                        <p>SAGE - Sistema Alternativo de Gestão Escolar</p>
                    </div>
                </div>

                <table class="info-table">
                    <tr>
                        <td width="55%"><strong>PROFESSOR:</strong> ${mapaUsuarios[plano.professor_id] || '---'}</td>
                        <td width="45%"><strong>DISCIPLINA:</strong> ${mapaDisciplinas[plano.disciplina_id] || '---'}</td>
                    </tr>
                    <tr>
                        <td><strong>SÉRIE/TURMA:</strong> ${plano.serie || '---'}</td>
                        <td><strong>MÊS/ANO DE REFERÊNCIA:</strong> ${plano.mes_referencia}/${plano.ano_referencia}</td>
                    </tr>
                </table>

                <div class="section-title">Conteúdo Programático Mensal</div>
                <div class="content-box">${plano.conteudo_mensal || ''}</div>

                <div class="section-title">Referências</div>
                <div class="content-box">${plano.referencias || ''}</div>

                <div class="section-title" style="margin-bottom:5px;">Detalhamento das Aulas</div>
                ${gerarHtmlAulas(plano)}

                <div class="footer-print">
                    <div class="sigs">
                        <div class="sig-line">Assinatura do Professor</div>
                        <div class="sig-line">Coordenação Pedagógica</div>
                    </div>
                    <p style="text-align:center; margin-top:15px; font-size:8px;">
                        Documento gerado pelo sistema SAGE em ${new Date().toLocaleDateString()} às ${new Date().toLocaleTimeString()}
                    </p>
                </div>
            `;

            document.getElementById('renderVisualizacao').innerHTML = htmlContent;
            document.getElementById('btnImprimirPDF').onclick = () => window.print();
            document.getElementById('modalPlano').classList.add('active');
        }

        function gerarHtmlAulas(p) {
            let html = '';
            for (let i = 1; i <= 40; i++) {
                const sub = p[`aula_${i}_subconteudo`];
                if (sub) {
                    html += `
                        <div class="aula-item">
                            <span class="aula-n">AULA ${i}</span>
                            <strong>Subconteúdo:</strong> ${sub}<br>
                            <strong>Metodologia:</strong> ${p[`aula_${i}_metodologia`] || '-'}<br>
                            <strong>Recursos:</strong> ${p[`aula_${i}_recursos`] || '-'}<br>
                            <strong>Avaliação:</strong> ${p[`aula_${i}_avaliacao`] || '-'}
                        </div>`;
                }
            }
            return html || '<div class="content-box">Nenhum detalhamento de aula registrado.</div>';
        }

        function fecharModal() { document.getElementById('modalPlano').classList.remove('active'); }
    </script>
</body>
</html>
