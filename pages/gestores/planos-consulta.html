<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE - Consulta de Planos</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 10px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 8px; width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto; padding: 25px; position: relative; }
        .view-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 13px; }
        .view-table td { border: 1px solid #ddd; padding: 8px; }
        .view-box { border: 1px solid #ddd; padding: 10px; margin-bottom: 15px; background: #f9f9f9; }

        /* Estilos dos novos filtros */
        .filtros-painel { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; border: 1px solid #ddd; }
        .filtro-group { display: flex; flex-direction: column; gap: 5px; }
        .filtro-group label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        .filtro-group select, .filtro-group input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .busca-container { grid-column: 1 / -1; margin-bottom: 5px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo"><h1>SAGE <span>Planos</span></h1></div>
            <nav class="user-info">
                <span id="userName" class="user-name">Carregando...</span>
                <button onclick="Auth.logout()" class="btn-logout">Sair</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="header-actions" style="margin: 20px 0;">
            <button onclick="location.href='dashboard.html'" class="btn-secondary">← Voltar</button>
        </div>

        <div class="filtros-painel">
            <div class="filtro-group busca-container">
                <input type="text" id="inputBusca" placeholder="Pesquisar por conteúdo ou nome..." oninput="aplicarFiltros()">
            </div>
            <div class="filtro-group">
                <label>Professor</label>
                <select id="filtroProfessor" onchange="aplicarFiltros()"><option value="">Todos</option></select>
            </div>
            <div class="filtro-group">
                <label>Disciplina</label>
                <select id="filtroDisciplina" onchange="aplicarFiltros()"><option value="">Todas</option></select>
            </div>
            <div class="filtro-group">
                <label>Série</label>
                <select id="filtroSerie" onchange="aplicarFiltros()">
                    <option value="">Todas</option>
                    <option value="1ª SÉRIE">1ª SÉRIE</option>
                    <option value="2ª SÉRIE">2ª SÉRIE</option>
                    <option value="3ª SÉRIE">3ª SÉRIE</option>
                </select>
            </div>
            <div class="filtro-group">
                <label>Mês</label>
                <input type="month" id="filtroMes" onchange="aplicarFiltros()">
            </div>
        </div>
        
        <div id="listaPlanos" class="planos-grid"></div>
    </main>

    <div id="modalPlano" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharModal()" style="position:absolute; right:15px; top:10px; cursor:pointer; font-size:24px;">&times;</span>
            <h2 style="text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">Pré-visualização do Plano</h2>
            <div id="renderVisualizacao"></div>
            <div class="modal-actions" style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
                <button id="btnImprimirPDF" class="btn-primary">📥 Gerar PDF do Plano</button>
                <button onclick="fecharModal()" class="btn-secondary">Fechar</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/utils.js"></script>

    <script>
        let todosPlanos = [];
        let mapaUsuarios = {};
        let mapaDisciplinas = {};

        document.addEventListener('DOMContentLoaded', async () => {
            if (!Auth.verificarAcesso()) return;
            document.getElementById('userName').textContent = Auth.getUsuarioLogado().nome;
            await carregarDados();
        });

        async function carregarDados() {
            try {
                Utils.mostrarLoading(true);
                const [resPlanos, resUsers, resDiscs] = await Promise.all([
                    API.listarPlanos(),
                    API.listarUsuarios(),
                    API.listarDisciplinas()
                ]);

                const selectProf = document.getElementById('filtroProfessor');
                (resUsers.dados || []).forEach(u => {
                    mapaUsuarios[u.id] = u.nome;
                    selectProf.innerHTML += `<option value="${u.id}">${u.nome}</option>`;
                });

                const selectDisc = document.getElementById('filtroDisciplina');
                (resDiscs.dados || []).forEach(d => {
                    mapaDisciplinas[d.id] = d.nome;
                    selectDisc.innerHTML += `<option value="${d.id}">${d.nome}</option>`;
                });

                todosPlanos = resPlanos.dados || [];
                renderizarPlanos(todosPlanos);
                Utils.mostrarLoading(false);
            } catch (error) {
                console.error("Erro ao carregar dados:", error);
                Utils.mostrarLoading(false);
            }
        }

        function aplicarFiltros() {
            const busca = document.getElementById('inputBusca').value.toLowerCase();
            const profId = document.getElementById('filtroProfessor').value;
            const discId = document.getElementById('filtroDisciplina').value;
            const serie = document.getElementById('filtroSerie').value;
            const mesFiltro = document.getElementById('filtroMes').value;

            const filtrados = todosPlanos.filter(p => {
                const nomeProf = (mapaUsuarios[p.professor_id] || "").toLowerCase();
                const nomeDisc = (mapaDisciplinas[p.disciplina_id] || "").toLowerCase();
                const conteudo = (p.conteudo_mensal || "").toLowerCase();
                
                const matchBusca = nomeProf.includes(busca) || nomeDisc.includes(busca) || conteudo.includes(busca);
                const matchProf = profId ? p.professor_id == profId : true;
                const matchDisc = discId ? p.disciplina_id == discId : true;
                const matchSerie = serie ? p.serie == serie : true;
                
                let matchMes = true;
                if (mesFiltro) {
                    const [ano, mes] = mesFiltro.split('-');
                    matchMes = (p.ano_referencia == ano && p.mes_referencia == parseInt(mes));
                }

                return matchBusca && matchProf && matchDisc && matchSerie && matchMes;
            });

            renderizarPlanos(filtrados);
        }

        function renderizarPlanos(planos) {
            const container = document.getElementById('listaPlanos');
            container.innerHTML = planos.map(p => `
                <div class="plano-card">
                    <h3>${mapaDisciplinas[p.disciplina_id] || 'Disciplina ID: '+p.disciplina_id}</h3>
                    <p><strong>Professor:</strong> ${mapaUsuarios[p.professor_id] || 'Não identificado'}</p>
                    <p><strong>Série/Turma:</strong> ${p.serie || '---'} | <strong>Mês/Ano:</strong> ${String(p.mes_referencia).padStart(2, '0')}/${p.ano_referencia}</p>
                    <button onclick="abrirModalPlano('${p.id}')" class="btn-primary" style="width:100%; margin-top:10px;">Ver e Imprimir</button>
                </div>
            `).join('');
        }

        function abrirModalPlano(id) {
            const plano = todosPlanos.find(p => p.id == id);
            if (!plano) return;

            const nomeProf = mapaUsuarios[plano.professor_id] || 'NÃO IDENTIFICADO';
            const nomeDisc = mapaDisciplinas[plano.disciplina_id] || 'NÃO IDENTIFICADA';
            const serieTurma = plano.serie || '---';
            const periodo = `${String(plano.mes_referencia).padStart(2, '0')}/${plano.ano_referencia}`;

            const htmlResumo = `
                <table class="view-table">
                    <tr><td><strong>Professor:</strong> ${nomeProf}</td><td><strong>Disciplina:</strong> ${nomeDisc}</td></tr>
                    <tr><td><strong>Série:</strong> ${serieTurma}</td><td><strong>Período:</strong> ${periodo}</td></tr>
                </table>
                <p><strong>Conteúdo Mensal:</strong></p>
                <div class="view-box">${plano.conteudo_mensal || 'Vazio'}</div>
            `;
            
            document.getElementById('renderVisualizacao').innerHTML = htmlResumo;
            document.getElementById('btnImprimirPDF').onclick = () => gerarPDF(plano, nomeProf, nomeDisc, serieTurma, periodo);
            document.getElementById('modalPlano').classList.add('active');
        }

        function gerarPDF(p, nomeProf, nomeDisc, serieTurma, periodo) {
            let aulasHtml = '';
            const aulasPorSemana = parseInt(p.aulas_semana) || 4; 
            let currentWeek = 0;
            let contadorAulaNaSemana = 0; // RESET DA CONTAGEM

            for (let i = 1; i <= 40; i++) {
                const sub = p[`aula_${i}_subconteudo`];
                if (sub) {
                    let weekNumber = Math.ceil(i / aulasPorSemana);
                    
                    if (weekNumber > currentWeek) {
                        aulasHtml += `<div class="week-title">SEMANA ${String(weekNumber).padStart(2, '0')}</div>`;
                        currentWeek = weekNumber;
                        contadorAulaNaSemana = 1; // Reseta para 1 no início da semana
                    } else {
                        contadorAulaNaSemana++; // Incrementa dentro da mesma semana
                    }

                    aulasHtml += `
                        <div class="aula-box">
                            <span class="aula-title">AULA ${String(contadorAulaNaSemana).padStart(2, '0')}</span>
                            <strong>Subconteúdo:</strong> ${sub}<br>
                            <strong>Metodologia:</strong> ${p[`aula_${i}_metodologia`] || '-'}<br>
                            <strong>Recursos:</strong> ${p[`aula_${i}_recursos`] || '-'}<br>
                            <strong>Avaliação:</strong> ${p[`aula_${i}_avaliacao`] || '-'}
                        </div>`;
                }
            }

            // O código de win.document.write permanece igual ao seu original
            const win = window.open('', '_blank');
            win.document.write(`<html><head><title>PDF</title><style>
                @page { margin: 1cm; }
                body { font-family: Arial, sans-serif; font-size: 11px; }
                .header-content { text-align: center; border-bottom: 1px solid #000; padding-bottom: 10px; margin-bottom: 15px; }
                .info-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
                .info-table td { border: 1px solid #000; padding: 6px; }
                .label { font-weight: bold; background: #f2f2f2; width: 120px; }
                .section-title { background: #e0e0e0; font-weight: bold; padding: 5px; border: 1px solid #000; text-align: center; margin-top: 10px; }
                .content-box { border: 1px solid #000; border-top: none; padding: 10px; margin-bottom: 10px; }
                .week-title { background: #d1e7dd; padding: 5px; border: 1px solid #000; font-weight: bold; text-align: center; margin-top: 10px; }
                .aula-box { border: 1px solid #000; padding: 8px; margin-bottom: 5px; page-break-inside: avoid; }
                .aula-title { font-weight: bold; text-decoration: underline; }
                .footer-content { margin-top: 20px; text-align: center; border-top: 1px solid #000; padding-top: 10px; }
                .signatures { display: flex; justify-content: space-around; margin-top: 30px; }
                .sig-line { border-top: 1px solid #000; width: 200px; padding-top: 5px; font-size: 9px; }
            </style></head>
            <body onload="window.print(); window.close();">
                <div class="header-content">
                    <strong>Coordenadoria Regional de Desenvolvimento da Educação – CREDE 16</strong><br>
                    Escola de Ensino Médio em Tempo Integral Filgueiras Lima
                </div>
                <table class="info-table">
                    <tr><td class="label">PROFESSOR:</td><td>${nomeProf.toUpperCase()}</td><td class="label">DISCIPLINA:</td><td>${nomeDisc.toUpperCase()}</td></tr>
                    <tr><td class="label">SÉRIE:</td><td>${serieTurma.toUpperCase()}</td><td class="label">MÊS/ANO:</td><td>${periodo}</td></tr>
                </table>
                <div class="section-title">Conteúdo Programático Mensal</div>
                <div class="content-box">${p.conteudo_mensal || ''}</div>
                <div class="section-title">Detalhamento das Aulas</div>
                ${aulasHtml}
                <div class="footer-content">
                    <div class="signatures">
                        <div class="sig-line">Assinatura do Professor(a)</div>
                        <div class="sig-line">Coordenação Pedagógica</div>
                    </div>
                </div>
            </body></html>`);
            win.document.close();
        }

        function fecharModal() { document.getElementById('modalPlano').classList.remove('active'); }
    </script>
</body>
</html>
